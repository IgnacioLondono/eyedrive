<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar contraseña — Eyedrive</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="brand-icon" id="brandIcon" aria-hidden="true"></span>
          <h1>Eyedrive</h1>
        </div>

        <div id="authMessage" class="auth-message" hidden></div>

        <h2 class="auth-title">Recuperar contraseña</h2>
        <p class="auth-subtitle">
          Introduce el correo de tu cuenta. Si existe, te enviaremos un código para crear una contraseña nueva.
        </p>
        <p class="auth-spam-hint" role="note">
          Si no recibes el correo en unos minutos, revisa la carpeta de <strong>spam</strong> o correo no deseado.
        </p>

        <form id="resetRequestForm" class="auth-form">
          <div class="auth-field">
            <label for="resetEmail">Correo electrónico</label>
            <input id="resetEmail" type="email" required autocomplete="email" placeholder="tu@correo.com" />
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn-primary" id="resetRequestBtn">Enviar código</button>
          </div>
        </form>

        <p class="auth-switch">
          <a href="/login.html">Volver a iniciar sesión</a>
        </p>
      </div>
    </div>
    <script src="auth-client.js"></script>
    <script src="icons.js"></script>
    <script src="eye-brand.js"></script>
    <script src="recuperar.js"></script>
  </body>
</html>
