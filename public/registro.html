<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta — Eyedrive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card auth-card--wide">
        <div class="auth-brand">
          <span class="brand-icon" id="brandIcon" aria-hidden="true"></span>
          <h1>Eyedrive</h1>
        </div>

        <div class="auth-steps" aria-label="Pasos del registro">
          <span class="auth-step auth-step--active">1. Tus datos</span>
          <span class="auth-step">2. Confirmar correo</span>
        </div>

        <div id="authMessage" class="auth-message" hidden></div>

        <h2 class="auth-title">Crear cuenta</h2>
        <p class="auth-subtitle">Rellena todos los campos. Después te enviaremos un código a tu correo.</p>
        <p class="auth-spam-hint" role="note">
          Si no recibes el correo en unos minutos, revisa la carpeta de <strong>spam</strong> o correo no deseado.
        </p>

        <form id="registerForm" class="auth-form">
          <div class="auth-field">
            <label for="registerName">Nombre</label>
            <input id="registerName" type="text" maxlength="80" required autocomplete="name" placeholder="Tu nombre" />
          </div>
          <div class="auth-field">
            <label for="registerEmail">Correo electrónico</label>
            <input id="registerEmail" type="email" required autocomplete="email" placeholder="tu@correo.com" />
          </div>
          <div class="auth-field">
            <label for="registerPassword">Contraseña</label>
            <input
              id="registerPassword"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="Mínimo 8 caracteres"
            />
          </div>
          <div class="auth-field">
            <label for="registerPasswordConfirm">Confirmar contraseña</label>
            <input
              id="registerPasswordConfirm"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="Repite la contraseña"
            />
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn-primary" id="registerSubmitBtn">Continuar y verificar correo</button>
          </div>
        </form>

        <p class="auth-switch">
          ¿Ya tienes cuenta?
          <a href="/login.html">Iniciar sesión</a>
        </p>
      </div>
    </div>
    <script src="auth-client.js"></script>
    <script src="icons.js"></script>
    <script src="eye-brand.js"></script>
    <script src="registro.js"></script>
  </body>
</html>
