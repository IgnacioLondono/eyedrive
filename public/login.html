<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — Eyedrive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="brand-icon" id="brandIcon" aria-hidden="true"></span>
          <h1>Eyedrive</h1>
        </div>

        <div id="authMessage" class="auth-message" hidden></div>

        <h2 class="auth-title">Inicia sesión</h2>
        <p class="auth-subtitle">Entra con el correo y la contraseña de tu cuenta.</p>

        <form id="loginForm" class="auth-form">
          <div class="auth-field">
            <label for="loginEmail">Correo electrónico</label>
            <input id="loginEmail" type="email" required autocomplete="email" placeholder="tu@correo.com" />
          </div>
          <div class="auth-field">
            <label for="loginPassword">Contraseña</label>
            <input
              id="loginPassword"
              type="password"
              required
              autocomplete="current-password"
              placeholder="Tu contraseña"
            />
          </div>
          <p class="auth-forgot">
            <a href="/recuperar.html">¿Olvidaste tu contraseña?</a>
          </p>
          <div class="auth-actions">
            <button type="submit" class="btn-primary" id="loginSubmitBtn">Entrar</button>
          </div>
        </form>

        <form id="login2faForm" class="auth-form" hidden>
          <h2 class="auth-title auth-title--step">Verificación en 2 pasos</h2>
          <p class="auth-subtitle">Introduce el código de tu app autenticadora, de respaldo o por correo.</p>
          <div class="auth-field">
            <label for="login2faMethod">Método</label>
            <select id="login2faMethod" class="auth-select">
              <option value="totp">App autenticadora (teléfono)</option>
              <option value="email">Código por correo</option>
              <option value="backup">Código de respaldo</option>
            </select>
          </div>
          <div class="auth-field">
            <label for="login2faCode" id="login2faCodeLabel">Código de 6 dígitos</label>
            <input
              id="login2faCode"
              class="auth-code-input"
              type="text"
              inputmode="numeric"
              maxlength="9"
              required
              placeholder="000000"
              autofocus
            />
          </div>
          <div class="auth-actions auth-actions--2fa">
            <button type="submit" class="btn-primary" id="login2faSubmitBtn">Verificar</button>
            <button type="button" class="btn-secondary" id="login2faEmailBtn" hidden>Enviar código al correo</button>
            <button type="button" class="btn-ghost" id="login2faBackBtn">Volver</button>
          </div>
        </form>

        <p class="auth-switch">
          ¿No tienes cuenta?
          <a href="/registro.html">Crear cuenta</a>
        </p>
      </div>
    </div>
    <script src="auth-client.js"></script>
    <script src="icons.js"></script>
    <script src="login.js"></script>
  </body>
</html>
