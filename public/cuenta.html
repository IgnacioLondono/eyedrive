<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi cuenta — Eyedrive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="account-page">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-icon" id="brandIcon" aria-hidden="true"></span>
          <h1>Eyedrive</h1>
        </div>
        <nav class="side-nav">
          <a class="side-link" href="/">
            <span class="side-link-ic" id="icNavDrive" aria-hidden="true"></span>
            <span>Mi unidad</span>
          </a>
          <a class="side-link active" href="/cuenta.html">
            <span class="side-link-ic" id="icNavAccount" aria-hidden="true"></span>
            <span>Mi cuenta</span>
          </a>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <h2 class="content-heading" style="margin: 0">Configuración de cuenta</h2>
        </header>

        <div class="account-panel">
          <div id="accountMessage" class="auth-message" hidden></div>

          <section class="account-section">
            <h3>Perfil</h3>
            <form id="profileForm" class="auth-form">
              <div class="auth-field">
                <label for="displayName">Nombre visible</label>
                <input id="displayName" type="text" maxlength="80" required />
              </div>
              <button type="submit" class="btn-primary">Guardar cambios</button>
            </form>
          </section>

          <section class="account-section">
            <h3>Información</h3>
            <div class="account-row">
              <label>Correo</label>
              <span id="accountEmail">—</span>
            </div>
            <div class="account-row">
              <label>Estado del correo</label>
              <span id="accountVerified">—</span>
            </div>
          </section>

          <section class="account-section">
            <h3>Sesión</h3>
            <p class="auth-subtitle" style="margin-bottom: 16px">
              Cierra sesión en este dispositivo o en todos los dispositivos.
            </p>
            <div class="auth-actions" style="grid-template-columns: 1fr 1fr">
              <button type="button" id="logoutBtn" class="btn-secondary">Cerrar sesión</button>
              <button type="button" id="logoutAllBtn" class="btn-secondary">Cerrar en todos</button>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="icons.js"></script>
    <script src="cuenta.js"></script>
  </body>
</html>
