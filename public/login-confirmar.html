<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmar acceso — Eyedrive</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="brand-icon" id="brandIcon" aria-hidden="true"></span>
          <h1>Eyedrive</h1>
        </div>

        <div class="auth-steps" aria-label="Pasos del inicio de sesión">
          <span class="auth-step auth-step--done">1. Correo y contraseña</span>
          <span class="auth-step auth-step--active">2. Código de acceso</span>
        </div>

        <div id="authMessage" class="auth-message" hidden></div>

        <h2 class="auth-title">Confirma tu acceso</h2>
        <p class="auth-subtitle">
          Hemos enviado un código de 6 dígitos a <strong id="loginEmailLabel">tu correo</strong>.
        </p>
        <p class="auth-spam-hint" role="note">
          Si no recibes el correo en unos minutos, revisa la carpeta de <strong>spam</strong> o correo no deseado.
        </p>

        <form id="loginConfirmForm" class="auth-form">
          <div class="auth-field">
            <label for="loginCode">Código de verificación</label>
            <input
              id="loginCode"
              class="auth-code-input"
              type="text"
              inputmode="numeric"
              pattern="\d{6}"
              maxlength="6"
              required
              placeholder="000000"
              autofocus
            />
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn-primary" id="loginConfirmBtn">Entrar</button>
            <button type="button" id="loginResendBtn" class="btn-secondary">Reenviar código</button>
          </div>
        </form>

        <p class="auth-switch">
          <a href="/login.html">Volver al inicio de sesión</a>
        </p>
      </div>
    </div>
    <script src="auth-client.js"></script>
    <script src="icons.js"></script>
    <script src="eye-brand.js"></script>
    <script src="login-confirmar.js"></script>
  </body>
</html>
