<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmar correo — Eyedrive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="brand-icon" id="brandIcon" aria-hidden="true"></span>
          <h1>Eyedrive</h1>
        </div>

        <div class="auth-steps" aria-label="Pasos del registro">
          <span class="auth-step auth-step--done">1. Tus datos</span>
          <span class="auth-step auth-step--active">2. Confirmar correo</span>
        </div>

        <div id="authMessage" class="auth-message" hidden></div>

        <h2 class="auth-title">Confirma tu correo</h2>
        <p class="auth-subtitle">
          Hemos enviado un código de 6 dígitos a <strong id="confirmEmail">tu correo</strong>.
        </p>

        <form id="confirmForm" class="auth-form">
          <div class="auth-field">
            <label for="confirmCode">Código de verificación</label>
            <input
              id="confirmCode"
              class="auth-code-input"
              type="text"
              inputmode="numeric"
              pattern="\d{6}"
              maxlength="6"
              required
              placeholder="000000"
              autofocus
            />
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn-primary" id="confirmSubmitBtn">Confirmar y entrar</button>
            <button type="button" id="resendBtn" class="btn-secondary">Reenviar código</button>
          </div>
        </form>

        <p class="auth-switch">
          <a href="/registro.html">Volver al formulario</a>
        </p>
      </div>
    </div>
    <script src="auth-client.js"></script>
    <script src="icons.js"></script>
    <script src="confirmar.js"></script>
  </body>
</html>
