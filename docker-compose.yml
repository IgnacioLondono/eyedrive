# Compatible con Docker Compose v2 y Portainer (stack)
services:
  db:
    image: postgres:16-alpine
    container_name: eyedrive-db
    environment:
      POSTGRES_USER: eyed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eyedpass}
      POSTGRES_DB: eyed
    volumes:
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Etc/Eyedrive/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U eyed -d eyed
      interval: 3s
      timeout: 5s
      retries: 12
      start_period: 8s
    restart: unless-stopped

  app:
    build: .
    image: eyedrive:local
    container_name: eyedrive
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://eyed:${POSTGRES_PASSWORD:-eyedpass}@db:5432/eyed
      UPLOAD_DIR: /app/data/uploads
      PORT: "3000"
      MAX_FILE_BYTES: "8589934592"
      MAX_FILES_PER_REQUEST: "20000"
      APP_URL: ${APP_URL:-https://eyedrive.nicolaslondono.uk}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SESSION_DAYS: ${SESSION_DAYS:-30}
    volumes:
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Etc/Eyedrive/uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build: ./nginx
    image: eyedrive-nginx:local
    container_name: eyedrive-nginx
    restart: unless-stopped
    ports:
      - "9990:80"
    depends_on:
      app:
        condition: service_healthy
